  host: "localhost"
  port: 5672
  username: "guest"
  password: "guest"
  vhost: "/"

redis:
  host: "localhost"
  port: 6379
  db: 0

kubernetes:
  namespace: "default"
  inCluster: false
  kubeconfigPath: "~/.kube/config"

nodes:
  - name: "node-1"
    cpuMilli: 4000
    memoryBytes: 17179869184  # 16GiB
    gpu: 0
    capacity: 100
security:
  # from pgv2 properties.iris.token.secret
  jwtSecretKey: "jwt-secrect-b-iris"
  jwtAlgorithm: "HS256"
  # from pgv2 properties.iris.token.max-age(3600 sec) -> 60 min
  accessTokenExpireMinutes: 60
logging:
  # from pgv2 logging.level.root=info
  level: "INFO"

url:
  graphio: "https://djs.mobigen.com/graphio/governance"
  # from pgv2 properties.iris.server.meta
  meta: "https://djs.mobigen.com/meta"
  containerManagement: "https://djs.mobigen.com/container-management"

# pgv2-origin/project/common/src/main/resources/application.yml
# 에서 pgv3 스키마에 직접 매핑되지 않는 항목 보존
compat:
  spring:
    web:
      locale: "ko"
    servlet:
      multipart:
        maxFileSize: "1024MB"
        maxRequestSize: "1024MB"
  server:
    port: 80
    sessionTimeoutSeconds: 7200
    contextPath: "/pgv2"
    compressionEnabled: true
    uriEncoding: "UTF-8"
  i18n:
    basenames:
      - "i18n/messages"
      - "i18n/exception"
      - "i18n/validation"
  httpClientConfiguration:
    maxTotal: 300
    defaultMaxPerRoute: 50
    defaultKeepAliveDuration: -1
    connectionRequestTimeout: 3000
    connectionTimeout: 3000
    socketTimeout: -1
    idleTimeout: 60
  iris:
    security:
      redirectUrl: "/"
      iframeOption: "disable"
      csrf: true
      sameSite: "Lax"
      cors:
        pattern: "/**"
        allowedOrigins: "http://localhost:3000"
        allowedMethods: "*"
        allowedHeaders: "*"
        allowCredentials: true
    token:
      name: "x-access-token"
      graphioName: "access_token"
    server:
      brick: "https://djs.mobigen.com"
      graphio: "https://djs.mobigen.com/graphio/governance"
    route:
      locales: ["ko", "en", "zh", "ja"]
    auth:
      rsaEnabled: true

# UI에서 쓰이는 설정들
common:
  pollingInterval: 5000
option:
  backupEnabled: true
  gpuEnabled: false
  storageEnabled: false
  mode: iris
analysisTool:
  defaultCpu: 1000
  defaultGpu: 1
  defaultMemory: 4294967296  # 4GiB
  defaultCapacity: 10
  maxExpireDuration: "6M"
test:
  user: "root"
  password: "biris.manse"